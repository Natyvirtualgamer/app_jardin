# docker-compose.yml — Entorno LOCAL de Desarrollo
# Docker Compose v2 | Python 3.11 | Node 18 | PostgreSQL 15
# USO: docker compose up --build

version: '3.9'

services:

  db:
    image: postgres:15-alpine
    container_name: jardin_db
    environment:
      POSTGRES_DB: ${DB_NAME:-jardin_db}
      POSTGRES_USER: ${DB_USER:-jardin_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jardin_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jardin_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: jardin_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-jardin_user}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-jardin_db}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-CAMBIA-EN-PRODUCCION}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - jardin_net
    volumes:
      - ./backend:/app/backend  # Hot reload solo en dev
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jardin_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost/api/v1}
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - jardin_net
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: jardin_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - jardin_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  jardin_net:
    driver: bridge
