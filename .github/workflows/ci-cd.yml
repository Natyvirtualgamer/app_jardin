name: CI/CD - Jardin Infantil

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_FRONTEND: ghcr.io/natyvirtualgamer/jardin-frontend
  IMAGE_BACKEND: ghcr.io/natyvirtualgamer/jardin-backend

jobs:
  test-backend:
    name: Tests backend + SonarCloud
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias backend
        run: pip install -r backend/requirements.txt pytest pytest-cov

      - name: Tests backend + coverage
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: test-secret-key-ci-only
        run: |
          PYTHONPATH=. pytest backend/tests/ -v \
            --cov=backend \
            --cov-report=xml:backend/coverage.xml \
            --cov-report=term \
            --cov-fail-under=60

      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  test-frontend:
    name: Tests frontend (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Tests frontend
        run: cd frontend && npm run test

  docker-build-scan:
    name: Docker Build + Trivy + GHCR
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          load: true

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          load: true

      - name: Trivy imagen backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Trivy imagen frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Trivy filesystem informativo
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload SARIF backend
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && hashFiles('trivy-backend.sarif') != '' }}
        continue-on-error: true
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Upload SARIF frontend
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && hashFiles('trivy-frontend.sarif') != '' }}
        continue-on-error: true
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Push a GHCR
        run: |
          docker tag ${{ env.IMAGE_FRONTEND }}:${{ github.sha }} ${{ env.IMAGE_FRONTEND }}:latest
          docker tag ${{ env.IMAGE_BACKEND }}:${{ github.sha }} ${{ env.IMAGE_BACKEND }}:latest
          docker push ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          docker push ${{ env.IMAGE_FRONTEND }}:latest
          docker push ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          docker push ${{ env.IMAGE_BACKEND }}:latest

  deploy-aws:
    name: Deploy -> AWS EC2
    runs-on: ubuntu-latest
    needs: docker-build-scan
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy EC2-A
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_A_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/app-jardin/nginx

            cat > ~/app-jardin/docker-compose.yml << 'COMPOSE'
            services:
              backend:
                image: ghcr.io/natyvirtualgamer/jardin-backend:latest
                container_name: jardin_backend
                env_file:
                  - .env
                networks:
                  - jardin_net
                healthcheck:
                  test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
                  interval: 15s
                  timeout: 5s
                  retries: 5
                  start_period: 10s
                restart: unless-stopped

              frontend:
                image: ghcr.io/natyvirtualgamer/jardin-frontend:latest
                container_name: jardin_frontend
                networks:
                  - jardin_net
                depends_on:
                  - backend
                restart: unless-stopped

              nginx:
                image: nginx:1.25-alpine
                container_name: jardin_nginx
                volumes:
                  - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
                ports:
                  - "80:80"
                networks:
                  - jardin_net
                depends_on:
                  - frontend
                  - backend
                restart: unless-stopped

            networks:
              jardin_net:
                driver: bridge
            COMPOSE

            cat > ~/app-jardin/nginx/nginx.conf << 'NGINX'
            upstream frontend {
                server frontend:80;
            }

            upstream backend {
                server backend:8000;
            }

            server {
                listen 80;
                server_name _;

                location / {
                    proxy_pass http://frontend;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                }

                location /api/ {
                    proxy_pass http://backend;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_read_timeout 60s;
                    proxy_connect_timeout 10s;
                }

                location /health {
                    proxy_pass http://backend/health;
                }

                add_header X-Frame-Options DENY always;
                add_header X-Content-Type-Options nosniff always;
            }
            NGINX

            cat > ~/app-jardin/.env << 'ENVFILE'
            DATABASE_URL=postgresql://jardin_user:${{ secrets.DB_PASSWORD }}@jardin-rds-dev.cugqhznyxm3c.us-east-1.rds.amazonaws.com:5432/jardin_db
            SECRET_KEY=${{ secrets.APP_SECRET_KEY }}
            ACCESS_TOKEN_EXPIRE_MINUTES=30
            AWS_REGION=us-east-1
            S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
            ENVFILE

            chmod 600 ~/app-jardin/.env

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE_FRONTEND }}:latest
            docker pull ${{ env.IMAGE_BACKEND }}:latest
            docker logout ghcr.io

            cd ~/app-jardin
            docker rm -f jardin_db 2>/dev/null || true
            docker compose down --remove-orphans
            docker compose up -d

            sleep 15
            curl -sf http://localhost/health || exit 1

      - name: Deploy EC2-B
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_B_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/app-jardin/nginx

            cat > ~/app-jardin/docker-compose.yml << 'COMPOSE'
            services:
              backend:
                image: ghcr.io/natyvirtualgamer/jardin-backend:latest
                container_name: jardin_backend
                env_file:
                  - .env
                networks:
                  - jardin_net
                healthcheck:
                  test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
                  interval: 15s
                  timeout: 5s
                  retries: 5
                  start_period: 10s
                restart: unless-stopped

              frontend:
                image: ghcr.io/natyvirtualgamer/jardin-frontend:latest
                container_name: jardin_frontend
                networks:
                  - jardin_net
                depends_on:
                  - backend
                restart: unless-stopped

              nginx:
                image: nginx:1.25-alpine
                container_name: jardin_nginx
                volumes:
                  - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
                ports:
                  - "80:80"
                networks:
                  - jardin_net
                depends_on:
                  - frontend
                  - backend
                restart: unless-stopped

            networks:
              jardin_net:
                driver: bridge
            COMPOSE

            cat > ~/app-jardin/nginx/nginx.conf << 'NGINX'
            upstream frontend {
                server frontend:80;
            }

            upstream backend {
                server backend:8000;
            }

            server {
                listen 80;
                server_name _;

                location / {
                    proxy_pass http://frontend;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                }

                location /api/ {
                    proxy_pass http://backend;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_read_timeout 60s;
                    proxy_connect_timeout 10s;
                }

                location /health {
                    proxy_pass http://backend/health;
                }

                add_header X-Frame-Options DENY always;
                add_header X-Content-Type-Options nosniff always;
            }
            NGINX

            cat > ~/app-jardin/.env << 'ENVFILE'
            DATABASE_URL=postgresql://jardin_user:${{ secrets.DB_PASSWORD }}@jardin-rds-dev.cugqhznyxm3c.us-east-1.rds.amazonaws.com:5432/jardin_db
            SECRET_KEY=${{ secrets.APP_SECRET_KEY }}
            ACCESS_TOKEN_EXPIRE_MINUTES=30
            AWS_REGION=us-east-1
            S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
            ENVFILE

            chmod 600 ~/app-jardin/.env

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE_FRONTEND }}:latest
            docker pull ${{ env.IMAGE_BACKEND }}:latest
            docker logout ghcr.io

            cd ~/app-jardin
            docker rm -f jardin_db 2>/dev/null || true
            docker compose down --remove-orphans
            docker compose up -d

            sleep 15
            curl -sf http://localhost/health || exit 1

  ansible-verify:
    name: Ansible -> Verificar nodos
    runs-on: ubuntu-latest
    needs: deploy-aws
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Ansible
        run: pip install ansible

      - name: Preparar SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/jardin.pem
          chmod 400 /tmp/jardin.pem

      - name: Inventory dinamico
        run: |
          cat > /tmp/inventory.ini << INV
          [app_servers]
          ec2-a ansible_host=${{ secrets.EC2_A_HOST }} ansible_user=ubuntu ansible_ssh_private_key_file=/tmp/jardin.pem
          ec2-b ansible_host=${{ secrets.EC2_B_HOST }} ansible_user=ubuntu ansible_ssh_private_key_file=/tmp/jardin.pem

          [app_servers:vars]
          ansible_python_interpreter=/usr/bin/python3
          ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          INV

      - name: Ansible verify
        run: |
          ansible app_servers -i /tmp/inventory.ini \
            -m shell -a "docker ps --no-trunc" --one-line

      - name: Limpiar SSH key
        if: always()
        run: rm -f /tmp/jardin.pem

  verify-alb:
    name: Verificar ALB post-deploy
    runs-on: ubuntu-latest
    needs: deploy-aws
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Health check via ALB
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf "http://${{ secrets.ALB_DNS }}/health"; then
              echo "ALB respondiendo OK"
              exit 0
            fi
            echo "Intento $i fallido, reintentando en 10s..."
            sleep 10
          done
          echo "ERROR: el ALB no respondio /health tras 5 intentos"
          exit 1

  sync-azure:
    name: Sync -> Azure Blob
    runs-on: ubuntu-latest
    needs: [ansible-verify, verify-alb]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Configurar credenciales AWS
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> "$GITHUB_ENV"
          if [ -n "${{ secrets.AWS_SESSION_TOKEN }}" ]; then
            echo "AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}" >> "$GITHUB_ENV"
          fi

      - name: Paso 1/2 - Sync S3 a runner local
        run: |
          aws s3 sync "s3://${{ secrets.S3_BUCKET_NAME }}" ./s3-backup \
            --region "${{ vars.AWS_REGION || 'us-east-1' }}"

      - name: Paso 2/2 - Upload runner local a Azure Blob
        run: |
          az storage blob upload-batch \
            --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
            --account-key "${{ secrets.AZURE_STORAGE_KEY }}" \
            --destination jardin-backup \
            --source ./s3-backup \
            --overwrite \
            --only-show-errors

      - name: Limpiar copia local
        if: always()
        run: rm -rf ./s3-backup
