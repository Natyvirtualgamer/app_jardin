# docker-compose.prod.yml — Produccion (EC2-A / EC2-B)
# Docker Compose v2 | Imagenes publicadas en GHCR | SIN base de datos local
#
# La base de datos productiva es RDS PostgreSQL — ver
# infra/cloudformation/templates/rds-s3.yaml. Este archivo NO debe
# contener ningun servicio "db" / "postgres" / "jardin_db".
#
# NOTA: si "docker compose ps" en una EC2 muestra un contenedor
# PostgreSQL, la configuracion productiva esta MAL.
#
# GHCR_OWNER: Docker Compose expande automaticamente ${GHCR_OWNER} si
# existe en el archivo ".env" del MISMO directorio donde se ejecuta
# "docker compose" (mecanismo nativo de Compose, independiente del
# "env_file:" de los servicios). El .env productivo lo genera
# scripts/inject_secrets_ssm.sh desde SSM, e incluye GHCR_OWNER como
# parametro adicional (ver scripts/create_ssm_params.sh).
#
# Si por algun motivo Compose no expande la variable en tu entorno,
# reemplaza manualmente "${GHCR_OWNER}" por tu usuario/org real de
# GitHub antes del deploy (ej: ghcr.io/mi-org/jardin-backend:latest).
#
# Variables consumidas via .env (generado por scripts/inject_secrets_ssm.sh
# desde SSM Parameter Store, NUNCA a mano):
#   DATABASE_URL, SECRET_KEY, AWS_REGION, S3_BUCKET_NAME,
#   ACCESS_TOKEN_EXPIRE_MINUTES, GHCR_OWNER

services:

  backend:
    image: ghcr.io/${GHCR_OWNER}/jardin-backend:latest
    container_name: jardin_backend
    env_file:
      - .env
    networks:
      - jardin_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GHCR_OWNER}/jardin-frontend:latest
    container_name: jardin_frontend
    networks:
      - jardin_net
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: jardin_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - jardin_net
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

networks:
  jardin_net:
    driver: bridge
