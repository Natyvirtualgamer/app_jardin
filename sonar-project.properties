# sonar-project.properties — SonarCloud (gratuito)
# Pasos para activar:
#   1. Ir a sonarcloud.io → Login con GitHub
#   2. Crear organización (usa tu usuario/org de GitHub)
#   3. Importar repositorio app-jardin
#   4. Copiar el SONAR_TOKEN generado → GitHub Secret SONAR_TOKEN
#   5. Completar sonar.organization con tu org de SonarCloud

sonar.projectKey=TU_ORG_jardin-infantil
sonar.organization=TU_ORG_EN_SONARCLOUD
sonar.projectName=Sistema Gestión Jardín Infantil
sonar.projectVersion=1.0.0

# Fuentes
sonar.sources=backend,frontend/src
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/migrations/**

# Python
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml

# Cobertura mínima esperada
sonar.coverage.exclusions=**/tests/**,**/migrations/**

# Duplicación
sonar.cpd.exclusions=**/tests/**
