---
# En Ubuntu/Debian el paquete openssh-server registra el servicio como
# "ssh" (no "sshd" como en RHEL/CentOS). Usar el nombre equivocado aqui
# no rompe el playbook (el handler simplemente no se dispara), pero el
# cambio a PermitRootLogin no se aplicaria hasta el proximo reboot.
- name: restart sshd
  systemd:
    name: ssh
    state: restarted
