# inventory.ini — Hosts EC2 para Ansible
# Las IPs se obtienen de los outputs de CloudFormation (stack jardin-<env>-ec2-alb)
# Ver: infra/cloudformation/environments/<env>/deploy.sh

[app_servers]
ec2-a ansible_host=REEMPLAZAR_IP_EC2_A ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/jardin-key.pem
ec2-b ansible_host=REEMPLAZAR_IP_EC2_B ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/jardin-key.pem

[app_servers:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
