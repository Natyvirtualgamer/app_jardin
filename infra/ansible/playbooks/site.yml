- name: Configurar nodos EC2 para jardÃ­n infantil
  hosts: app_servers
  become: yes
  gather_facts: yes

  vars:
    app_dir: /home/ubuntu/app-jardin
    docker_compose_version: "2.27.0"

  roles:
    - common

  post_tasks:
    - name: Verificar Docker activo
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Verificar deploy bÃ¡sico
      shell: docker ps --no-trunc
      register: containers
      changed_when: false

    - name: Mostrar contenedores activos
      debug:
        msg: "Contenedores activos: {{ containers.stdout_lines }}"
